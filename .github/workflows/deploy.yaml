name: Deploy

on:
  repository_dispatch:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      LOSS_THRESHOLD: ${{ vars.LOSS_THRESHOLD || 10 }}
      DELAY_THRESHOLD: ${{ vars.DELAY_THRESHOLD || 500 }}
      RANDOM_COUNT: ${{ vars.RANDOM_COUNT || 10 }}
      GET_DATA_INTERVAL: ${{ vars.GET_DATA_INTERVAL || 2 }}
      SAVE_ACCOUNT_INTERVAL: ${{ secrets.SAVE_ACCOUNT_INTERVAL || 10 }}
      RESET_ACCOUNT_INTERVAL: ${{ secrets.RESET_ACCOUNT_INTERVAL || 2880 }}

    steps:
      - uses: actions/checkout@v4
      
      - uses: cloudflare/wrangler-action@v3
        with:
          packageManager: npm
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 将脚本合并为单行执行，杜绝语法解析错误
          preCommands: |
            DB_UUID=$(npx wrangler d1 list --json | jq -r '.[] | select(.name=="warp-db") | .uuid' | head -n1); if [ -n "$DB_UUID" ]; then sed -i "s/database_id = \".*\"/database_id = \"$DB_UUID\"/g" wrangler.toml; else echo "Error: Database not found"; exit 1; fi

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 2