name: Deploy

on:
  repository_dispatch:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v3
        with:
          version: latest
          run_install: true
          
      - uses: cloudflare/wrangler-action@v3
        with:
          packageManager: pnpm
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 修复点：保留原作者的 preCommands，确保 UUID 绑定和表初始化逻辑准确
          preCommands: |
            # 确保数据库存在并更新 wrangler.toml 中的 UUID
            DB_UUID=$(wrangler d1 list --json | jq -r '.[] | select(.name=="warp-db") | .uuid')
            if [ -z "$DB_UUID" ]; then
              wrangler d1 create warp-db
              DB_UUID=$(wrangler d1 list --json | jq -r '.[] | select(.name=="warp-db") | .uuid')
            fi
            sed -i "s/database_id = \".*\"/database_id = \"$DB_UUID\"/g" wrangler.toml
          
          # 修复点：确保执行部署后运行 schema 初始化
          postCommands: |
            wrangler d1 execute warp-db --file=./schema.sql
            
          # 关键点：保留原作者的 secrets 定义，确保这些环境变量被注入到 Worker 环境中
          secrets: |
            SECRET_KEY
            LOSS_THRESHOLD
            DELAY_THRESHOLD
            RANDOM_COUNT
            GET_DATA_INTERVAL
            SAVE_ACCOUNT_INTERVAL
            RESET_ACCOUNT_INTERVAL

        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          LOSS_THRESHOLD: ${{ vars.LOSS_THRESHOLD || 10 }}
          DELAY_THRESHOLD: ${{ vars.DELAY_THRESHOLD || 500 }}
          RANDOM_COUNT: ${{ vars.RANDOM_COUNT || 10 }}
          GET_DATA_INTERVAL: ${{ vars.GET_DATA_INTERVAL || 2 }}
          SAVE_ACCOUNT_INTERVAL: ${{ secrets.SAVE_ACCOUNT_INTERVAL || 10 }}
          RESET_ACCOUNT_INTERVAL: ${{ secrets.RESET_ACCOUNT_INTERVAL || 2880 }}

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 2