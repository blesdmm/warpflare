name: Deploy

on:
  repository_dispatch:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      # 强制指定 Node.js 20 环境，修复兼容性报错
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - uses: pnpm/action-setup@v3
        with:
          version: latest
          run_install: true
          
      - uses: cloudflare/wrangler-action@v3
        with:
          packageManager: pnpm
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 部署前环境准备
          preCommands: |
            pnpm install -g wrangler
          # 部署后进行数据库 UUID 绑定和表结构初始化
          postCommands: |
            DB_UUID=$(wrangler d1 list --json | jq -r '.[] | select(.name=="warp-db") | .uuid' | head -n1)
            if [ -n "$DB_UUID" ]; then
              sed -i "s/database_id = \".*\"/database_id = \"$DB_UUID\"/g" wrangler.toml
              wrangler d1 execute warp-db --file=./schema.sql
            else
              echo "Warning: Database warp-db not found, skipping schema initialization."
            fi
          # 确保环境变量正确注入
          secrets: |
            SECRET_KEY
            LOSS_THRESHOLD
            DELAY_THRESHOLD
            RANDOM_COUNT
            GET_DATA_INTERVAL
            SAVE_ACCOUNT_INTERVAL
            RESET_ACCOUNT_INTERVAL
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          LOSS_THRESHOLD: ${{ vars.LOSS_THRESHOLD || 10 }}
          DELAY_THRESHOLD: ${{ vars.DELAY_THRESHOLD || 500 }}
          RANDOM_COUNT: ${{ vars.RANDOM_COUNT || 10 }}
          GET_DATA_INTERVAL: ${{ vars.GET_DATA_INTERVAL || 2 }}
          SAVE_ACCOUNT_INTERVAL: ${{ secrets.SAVE_ACCOUNT_INTERVAL || 10 }}
          RESET_ACCOUNT_INTERVAL: ${{ secrets.RESET_ACCOUNT_INTERVAL || 2880 }}

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 2