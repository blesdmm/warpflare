name: Deploy

on:
  repository_dispatch:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      LOSS_THRESHOLD: ${{ vars.LOSS_THRESHOLD || 10 }}
      DELAY_THRESHOLD: ${{ vars.DELAY_THRESHOLD || 500 }}
      RANDOM_COUNT: ${{ vars.RANDOM_COUNT || 10 }}
      GET_DATA_INTERVAL: ${{ vars.GET_DATA_INTERVAL || 2 }}
      SAVE_ACCOUNT_INTERVAL: ${{ secrets.SAVE_ACCOUNT_INTERVAL || 10 }}
      RESET_ACCOUNT_INTERVAL: ${{ secrets.RESET_ACCOUNT_INTERVAL || 2880 }}

    steps:
      - uses: actions/checkout@v4
      
      - uses: cloudflare/wrangler-action@v3
        with:
          packageManager: npm
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 核心修复：在部署前强制更新 wrangler.toml 中的数据库 ID
          preCommands: |
            DB_UUID=$(npx wrangler d1 list --json | jq -r '.[] | select(.name=="warp-db") | .uuid' | head -n1)
            if [ -n "$DB_UUID" ]; then
              echo "Updating database_id in wrangler.toml to $DB_UUID"
              sed -i "s/database_id = \".*\"/database_id = \"$DB_UUID\"/g" wrangler.toml
            else
              echo "Error: Database warp-db not found."
              exit 1
            fi
          # 确保部署时不额外触发 D1 初始化，避免 ID 冲突
          postCommands: |
            echo "Deployment successful."

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 2