name: Deploy

on:
  repository_dispatch:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v3
        with:
          version: latest
          run_install: false
          
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          rm -rf pnpm-lock.yaml
          npm install
          
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 核心修复：添加 || true 忽略创建已存在数据库时的报错
          preCommands: |
            npx wrangler d1 list --json > d1_list.json
            DB_UUID=$(jq -r '.[] | select(.name=="warp-db") | .uuid' d1_list.json || echo "")
            if [ -z "$DB_UUID" ]; then echo "Creating database..." && npx wrangler d1 create warp-db || true && npx wrangler d1 list --json > d1_list_new.json && DB_UUID=$(jq -r '.[] | select(.name=="warp-db") | .uuid' d1_list_new.json); fi
            echo "Using D1 UUID: $DB_UUID"
            sed -i "s/database_id = \".*\"/database_id = \"$DB_UUID\"/g" wrangler.toml
          postCommands: |
            npx wrangler d1 execute warp-db --file=./schema.sql
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          LOSS_THRESHOLD: ${{ vars.LOSS_THRESHOLD || 10 }}
          DELAY_THRESHOLD: ${{ vars.DELAY_THRESHOLD || 500 }}
          RANDOM_COUNT: ${{ vars.RANDOM_COUNT || 10 }}
          GET_DATA_INTERVAL: ${{ vars.GET_DATA_INTERVAL || 2 }}
          SAVE_ACCOUNT_INTERVAL: ${{ secrets.SAVE_ACCOUNT_INTERVAL || 10 }}
          RESET_ACCOUNT_INTERVAL: ${{ secrets.RESET_ACCOUNT_INTERVAL || 2880 }}

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 2