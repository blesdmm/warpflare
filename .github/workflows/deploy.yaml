name: Deploy

on:
  repository_dispatch:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    # 将 Secrets 直接声明为 Job 级别的环境变量，这样所有步骤都能直接读取
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      LOSS_THRESHOLD: ${{ vars.LOSS_THRESHOLD || 10 }}
      DELAY_THRESHOLD: ${{ vars.DELAY_THRESHOLD || 500 }}
      RANDOM_COUNT: ${{ vars.RANDOM_COUNT || 10 }}
      GET_DATA_INTERVAL: ${{ vars.GET_DATA_INTERVAL || 2 }}
      SAVE_ACCOUNT_INTERVAL: ${{ secrets.SAVE_ACCOUNT_INTERVAL || 10 }}
      RESET_ACCOUNT_INTERVAL: ${{ secrets.RESET_ACCOUNT_INTERVAL || 2880 }}

    steps:
      - uses: actions/checkout@v4
      
      - uses: cloudflare/wrangler-action@v3
        with:
          packageManager: npm
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 移除 secrets 参数，避免 Action 内部尝试再次读取不存在的配置
          # 直接使用上面的 env 注入
          postCommands: |
            DB_UUID=$(npx wrangler d1 list --json | jq -r '.[] | select(.name=="warp-db") | .uuid' | head -n1)
            if [ -n "$DB_UUID" ]; then
              sed -i "s/database_id = \".*\"/database_id = \"$DB_UUID\"/g" wrangler.toml
              npx wrangler d1 execute warp-db --file=./schema.sql
            else
              echo "Warning: Database warp-db not found, skipping schema initialization."
            fi

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 2